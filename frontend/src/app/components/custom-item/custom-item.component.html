

<div class="item-container">
<div class="image-wrapper">
  <img src="{{ task.image }}" alt="">
  <div class="time-badge">
    {{ task.duration}} 
  </div>
</div>
<div class="item-info">
  <h2>{{task.name}}</h2>
  <p class="description">{{task.description}}</p>
</div>
<div class="button-container">
  <button class="button-view" (click)="showDetail()">
    View detail
  </button>
</div>
</div>
