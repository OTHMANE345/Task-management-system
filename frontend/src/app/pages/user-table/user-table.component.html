<div class="container">
    <table>
        <thead>
            <tr>
                <td>UserName</td>
                <td>Email</td>
                <td>Phone</td>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let user of users">
                <td>{{user.name}}</td>
                <td>{{user.email}}</td>
                <td>{{user.contactNumber}}</td>
            </tr>
        
             
        </tbody>
    </table>
</div>
